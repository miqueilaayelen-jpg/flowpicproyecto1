<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FlowPic 📸</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: Arial;
    background:#000;
    color:white;
}

/* HEADER */
.header {
    background:#0d0d0d;
    padding:15px;
    text-align:center;
    border-bottom:2px solid #ffb6c1;
    font-weight:bold;
}

/* LOGIN */
#loginBox {
    max-width:400px;
    margin:40px auto;
    background:#111;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

/* APP */
#app { display:none; }

/* TABS */
.tabs {
    display:flex;
    justify-content:space-around;
    background:#111;
    border-bottom:2px solid #222;
}

.tab {
    padding:12px;
    cursor:pointer;
    font-weight:bold;
}

.tab.active {
    color:#ff4d6d;
    border-bottom:2px solid #ff4d6d;
}

/* SECTIONS */
.section { display:none; padding:10px; }
.section.active { display:block; }

/* PROFILE HEADER */
.profile {
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
}

.avatar {
    width:55px;
    height:55px;
    border-radius:50%;
    border:2px solid #ffb6c1;
    object-fit:cover;
}

/* POST */
.post {
    background:#111;
    margin:10px auto;
    max-width:500px;
    border-radius:12px;
    overflow:hidden;
}

.post img { width:100%; }

/* INSTAGRAM BUTTON */
.ig-btn {
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    margin-top:8px;
}

.btn-blue { background:#0095f6; color:white; }
.btn-pink { background:linear-gradient(90deg,#ff4d6d,#ffb703); color:white; }

/* INPUT FILE LABEL */
.upload-label {
    display:block;
    padding:12px;
    background:linear-gradient(90deg,#ff4d6d,#ffb703);
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    text-align:center;
    margin-bottom:10px;
}

.upload-label input { display:none; }

.box {
    max-width:420px;
    margin:auto;
    background:#111;
    padding:15px;
    border-radius:12px;
    text-align:center;
}

.like {
    color:#ff4d6d;
    font-size:16px;
    background:none;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">FlowPic 📸</div>

<!-- LOGIN -->
<div id="loginBox">

    <h3>Login</h3>
    <input id="user">
    <input id="pass" type="password">
    <button class="ig-btn btn-blue" onclick="login()">Entrar</button>

    <hr>

    <h3>Registro</h3>
    <input id="reg_user">
    <input id="reg_pass" type="password">
    <button class="ig-btn btn-pink" onclick="register()">Crear cuenta</button>

</div>

<!-- APP -->
<div id="app">

    <!-- TABS -->
    <div class="tabs">
        <div class="tab active" onclick="showTab('news')">Noticias</div>
        <div class="tab" onclick="showTab('profile')">Mi perfil</div>
    </div>

    <!-- NEWS -->
    <div id="news" class="section active">
        <div id="feed"></div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="section">

        <div class="profile">
            <img id="myAvatar" class="avatar" src="/uploads/default.png">
            <b>@<span id="myUser"></span></b>
        </div>

        <!-- CAMBIAR FOTO PERFIL -->
        <div class="box">
            <h3>Foto de perfil</h3>

            <form id="avatarForm">
                <label class="upload-label">
                    📸 Cambiar foto de perfil
                    <input type="file" name="file" required>
                </label>

                <button class="ig-btn btn-blue" type="submit">Guardar</button>
            </form>
        </div>

        <!-- SUBIR POST DESDE PERFIL -->
        <div class="box">
            <h3>Publicar en mi perfil</h3>

            <form id="uploadForm">
                <label class="upload-label">
                    ➕ Subir publicación
                    <input type="file" name="file" required>
                </label>

                <button class="ig-btn btn-pink" type="submit">Publicar</button>
            </form>
        </div>

        <!-- MIS POSTS -->
        <div id="myPosts"></div>
    </div>

</div>

<script>

let user=null;

// LOGIN
async function login(){

    const res=await fetch("/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:document.getElementById("user").value,
            password:document.getElementById("pass").value
        })
    });

    const data=await res.json();

    if(data.ok){

        user=document.getElementById("user").value;
        localStorage.setItem("user",user);

        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";

        document.getElementById("myUser").innerText=user;

        loadFeed();
        loadMyPosts();

    } else {
        alert(data.msg);
    }
}

// REGISTER
async function register(){

    await fetch("/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            username:document.getElementById("reg_user").value,
            password:document.getElementById("reg_pass").value
        })
    });

    alert("Cuenta creada");
}

// TABS
function showTab(tab){

    document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

    document.getElementById(tab).classList.add("active");
    event.target.classList.add("active");

    if(tab==="profile") loadMyPosts();
}

// UPLOAD POST (DESDE PERFIL)
document.getElementById("uploadForm").addEventListener("submit",async(e)=>{
    e.preventDefault();

    const formData=new FormData(e.target);
    formData.append("username",localStorage.getItem("user"));

    await fetch("/upload",{method:"POST",body:formData});

    e.target.reset();
    loadFeed();
    loadMyPosts();
});

// AVATAR
document.getElementById("avatarForm").addEventListener("submit",async(e)=>{
    e.preventDefault();

    const formData=new FormData(e.target);
    formData.append("username",localStorage.getItem("user"));

    const res=await fetch("/set_avatar",{method:"POST",body:formData});
    const data=await res.json();

    if(data.ok){
        document.getElementById("myAvatar").src=data.avatar;
    }
});

// FEED
async function loadFeed(){

    const res=await fetch("/feed");
    const data=await res.json();

    const feed=document.getElementById("feed");
    feed.innerHTML="";

    data.images.forEach(p=>{

        const div=document.createElement("div");
        div.className="post";

        div.innerHTML=`
            <img src="${p.url}">
            <div style="padding:10px;">
                <b>@${p.user}</b><br>
                <button class="like" onclick="likePost('${p.name}')">❤️ ${p.likes}</button>
            </div>
        `;

        feed.appendChild(div);
    });
}

// MIS POSTS
async function loadMyPosts(){

    const res=await fetch("/feed");
    const data=await res.json();

    const box=document.getElementById("myPosts");
    box.innerHTML="";

    data.images
        .filter(p=>p.user===user)
        .forEach(p=>{

        const div=document.createElement("div");
        div.className="post";

        div.innerHTML=`
            <img src="${p.url}">
            <div style="padding:10px;">
                ❤️ ${p.likes}
            </div>
        `;

        box.appendChild(div);
    });
}

// LIKE
async function likePost(name){
    await fetch("/like/"+name,{method:"POST"});
    loadFeed();
}

</script>

</body>
</html>

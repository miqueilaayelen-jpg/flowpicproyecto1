<!DOCTYPE html>
<html>
<head>
    <title>FlowPic 📸</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #000;
            margin: 0;
            color: white;
        }

        .header {
            background: #0d0d0d;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 2px solid #ffb6c1;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 10px;
        }

        /* LOGIN */
        .box {
            max-width: 400px;
            margin: 20px auto;
            background: #111;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            border: none;
        }

        .btn {
            width: 95%;
            padding: 10px;
            background: #0095f6;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* APP */
        #app {
            display: none;
        }

        /* UPLOAD (tu estilo original) */
        .upload-box {
            background: #0d0d0d;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 2px solid #ffb6c1;
        }

        .upload-btn {
            display: block;
            background: #0095f6;
            color: white;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
        }

        #fileInput {
            display: none;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            width: 100%;
            background: #0095f6;
            border: none;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        /* FEED GRID */
        #feed {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .post {
            background: #0d0d0d;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #ffb6c1;
        }

        .post img {
            width: 100%;
            display: block;
        }

        .post-info {
            padding: 10px;
        }

        .like-btn {
            background: none;
            border: none;
            color: #0095f6;
            font-size: 16px;
            cursor: pointer;
            padding: 0;
        }

        .likes {
            font-weight: bold;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            #feed {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<div class="header">FlowPic 📸</div>

<!-- LOGIN -->
<div id="loginBox">

    <div class="box">
        <h3>Registrarse</h3>
        <input id="reg_user" placeholder="usuario">
        <input id="reg_pass" type="password" placeholder="contraseña">
        <button class="btn" onclick="register()">Crear cuenta</button>
    </div>

    <div class="box">
        <h3>Entrar</h3>
        <input id="user" placeholder="usuario">
        <input id="pass" type="password">
        <button class="btn" onclick="login()">Ingresar</button>
        <p id="msg"></p>
    </div>

</div>

<!-- APP -->
<div id="app">

    <div class="container">

        <!-- UPLOAD (TU DISEÑO ORIGINAL) -->
        <div class="upload-box">

            <form id="uploadForm">

                <label for="fileInput" class="upload-btn">
                    + Publicación
                </label>

                <input id="fileInput" type="file" name="file" accept="image/*" required>

                <button type="submit">Subir</button>

            </form>

        </div>

        <!-- FEED -->
        <div id="feed"></div>

    </div>

</div>

<script>

// ---------------- LOGIN ----------------
async function register() {

    const username = document.getElementById("reg_user").value;
    const password = document.getElementById("reg_pass").value;

    await fetch("/register", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    alert("Usuario creado");
}

async function login() {

    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    const res = await fetch("/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.ok) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("app").style.display = "block";
        loadFeed();
    } else {
        document.getElementById("msg").innerText = "Login incorrecto";
    }
}

// ---------------- UPLOAD ----------------
document.getElementById("uploadForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);

    await fetch("/upload", {
        method: "POST",
        body: formData
    });

    this.reset();
    loadFeed();
});

// ---------------- FEED ----------------
async function loadFeed() {

    const res = await fetch("/feed");
    const data = await res.json();

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    data.images.forEach(post => {

        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <img src="${post.url}" />

            <div class="post-info">
                <button class="like-btn" onclick="likePost('${post.name}')">
                    ❤️ Like
                </button>

                <div class="likes">❤️ ${post.likes} likes</div>
            </div>
        `;

        feed.appendChild(div);
    });
}

// ---------------- LIKE ----------------
async function likePost(name) {
    await fetch("/like/" + name, { method: "POST" });
    loadFeed();
}

// auto refresh
loadFeed();
setInterval(loadFeed, 3000);

</script>

</body>
</html>
